services:
    www:
        build: ./www/
        container_name: "mai-www"
        volumes:
            - ./www/html/:/var/www/html
            - D:/Top/Dev/ts/mai/src/html:/var/www/my/mai
            - ./www/config/apache/my.conf:/etc/apache2/conf-enabled/my.conf
        privileged: true
        environment:
            - LANG=ja_JP.UTF-8
        ports:
            - "9090:80"
            - "9099:8080"
        depends_on:
            - sql
    sql:
        build: ./sql/
        container_name: "mai-sql"
        volumes:
            - my_db:/var/lib/mysql
#            - ./sql/config/my.cnf:/etc/mysql/conf.d/my.cnf
        environment:
            - MYSQL_ROOT_PASSWORD=root
            - MYSQL_DATABASE=db_mai
            - MYSQL_USER=itsayno33
            - MYSQL_PASSWORD=PE333833
            - LANG=ja_JP.UTF-8
        ports:
            - "5306:3306"
            - "35060:33060"
    bck:
#        image: debian:12.7-slim
        build: ./bck/
        container_name: "mai-bck"
        tty: true
#        user:  "node"
        working_dir: /home/node/app
        volumes:
            - ./bck/app:/home/node/app
        environment:
            - PORT=5000
            - LANG=ja_JP.UTF-8
        ports:
            - "8888:5000"
        depends_on:
            - sql
#        command: npm start
volumes:
    my_db:
